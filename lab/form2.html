<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form class="card">
        <div class="card-header">
            <h1>Registration Form</h1>
            
            <p>Please complete all fields below.</p>
        </div>
        <div class="card-body">
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <div class="postalcode">
                <label for="postalcode">Postal Code</label>
                <input type="text" id="postalcode" name="postalcode" placeholder="Enter your postal code" required>
            </div>
            <div class="dob">
                <label for="dateofbirth">Date of Birth</label>
                <input type="date" id="dateofbirth" name="dateofbirth" required>
            </div>
            <div class="email">
                <label for="emailaddress">Email Address</label>
                <input type="email" id="emailaddress" name="emailaddress" placeholder="Enter your email address" required>
            </div>
            <div class="Reg-PASS">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter at least 8 characters"  required>
            </div>
            <div class="Country">
                <label for="country">Country</label>
                <select id="country" name="country" required>
                        <option value="select">Select</option>
                        <option value="Dhk">Bangladesh</option>
                        <option value="Br">India</option>
                        <option value="Raj">nepal</option>
                        <option value="ctg">china</option>
                        <option value="Cml">Japan</option>
                        <option value="Eu">Europe</option>
                        <option value="Usa">USA</option>
                </select>
            </div>
            <div class="button">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </div>
    </form>

    
</body>
</html>
