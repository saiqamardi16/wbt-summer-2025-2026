<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <<!-- Link CSS -->
    <link rel="stylesheet" herf="">
</head>
<body>
    <form class="card">
        <div class="card-header">
            <h1>Create your account</h1>
            
            <p>Join us in a couple of steps.</p>
        </div>
        <div class="card-body">
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <div class="postalcode">
                <label for="postalcode">Postal Code</label>
                <input type="text" id="postalcode" name="postalcode" placeholder="Enter your postal code" required>
            </div>
            <div class="field">
                <label for="dateofbirth">Date of Birth</label>
                <input type="date" id="dateofbirth" name="dateofbirth" required>
            </div>
            <div class="email">
                <label for="emailaddress">Email Address</label>
                <input type="email" id="emailaddress" name="emailaddress" placeholder="Enter your email address" required>
            </div>
            <div class="password">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter at least 8 characters"  required>
            </div>
            <div class="radio">
                <label for="prefferedcontact">Preferred Contact Method</label>
                <input type="radio" id="email" name="preferredcontact" value="email" required>
                <label for="email">Email</label>
                <input type="radio" id="phone" name="preferredcontact" value="phone" required>
                <label for="phone">Phone</label>

                </label>
            </div>
            <div class="button">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </div>
    </form>
    
</body>
</html>
