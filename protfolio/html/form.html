<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1> Donor Information</h1>
    <!-- Simple Registration Form -->
    <form method="post">
        <fieldset>
            <legend>Personal information </legend>
            <table>

                </tr>
                <tr>

                    <td><input type="text" id="last_name" name="last_name" required></td>
                </tr>
                <tr>
                    <td><label for="company">Company:</label></td>
                    <td><input type="text" id="company" name="company" required></td>
                </tr>
                <tr>
                    <td><label for="address1">Address 1:</label></td>
                    <td><input type="text" id="address1" name="address1" required></td>
                </tr>
                <tr>
                    <td><label for="address2">Address 2:</label></td>
                    <td><input type="text" id="address2" name="address2"></td>
                </tr>
                <tr>
                    <td><label for="city">City:</label></td>
                    <td><input type="text" id="city" name="city" required></td>
                </tr>
                <tr>
                    <td><label for="state">State:</label></td>
                    <td><select id="state" name="state" required>
                        <option value="select">Select</option>

                        <option value="Raj">Rajshahi</option>
                        <option value="ctg">Chittagong</option>
                        <option value="Cml">Cumilla</option>
                    </select></td>
                </tr>
                <tr>
                    <td><label for="zipcode">Zip Code:</label></td>
                    <td><input type="text" id="zipcode" name="zipcode" required></td>
                </tr>
                <tr>
                    <td><label for="country">Country:</label></td>
                    <td><select id="country" name="country" required>
                        <option value="select">Select</option>
                        <option value="BD">Bangladesh</option>
                    </select></td>
                </tr>    
                <tr>
                    <td><label for="phone ">Phone:</label></td>
                    <td><input type="text" id="phone " name="phone " required></td>
                </tr>
                <tr>
                    <td><label for="fax">Fax:</label></td>
                    <td><input type="text" id="fax" name="fax"></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
                <tr>
                     <td><label for="donationamount">Donation Amount:</label></td>
                    <td>
                        <input type="radio" name="donation" value="100tk">100tk
                        <input type="radio" name="donation" value="500tk">500tk
                        <input type="radio" name="donation" value="1000tk">1000tk
                        <input type="radio" name="donation" value="more">More than 1000tk
                    </td>
                    <tr></tr>
                        
                    </td>
                </tr><td><label for="Amount">Amount:</label></td>
                    <td><input type="text" id="Amount" name="Amount"></td>
        <tr>
            
                     <td><label for="recurringdonation">Recurring Donation:</label></td>
                    <td>
                        <input type="checkbox" name="recurringdonation" value="i am interested and i am giving on a regular basis">I am interested and I am giving on a regular basis

                    </td>
                    <tr></tr>
                        
                    </td>
                </tr>
                <td><label for="Amount">Amount:</label></td>
                    <td><input type="text" id="Amount" name="Amount"></td>
        </tr>
                </tr>
                <tr>
                    <td><label for="monthly">Monthly:</label></td>
                    <td><input type="text" id="monthly" name="monthly"></td>
        
            </table>
        </fieldset>

        <!--New fieldset adding-->
        <fieldset>
            <legend>Honourium and Memorial Donation Infos</legend>
            <tr>
                <td>
                    <label for="i would to like to make this donation">I would to like to make this donation</label>
                </td>
            </tr>

            <tr>
                <td>
                    <input type="radio" name="donationtype" value="in honour of">In Honour of
                </td>
                <td>
                    <input type="radio" name="donationtype" value="in memory of">In Memory of
                </td>
            </tr>
